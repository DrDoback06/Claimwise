<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Loomwright — Daily Spark</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,400;9..144,0,500;9..144,0,600;9..144,1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; height:100%; overflow:hidden; }
  *::-webkit-scrollbar { width:8px; height:8px; } *::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.3); border-radius:4px; }
  button, input, select, textarea { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="proto/theme.jsx"></script>
<script type="text/babel">

const TODAY = { day: 'Thursday', date: 'October 17', streak: 12, wordsYesterday: 1_240, goal: 1_500 };

const SPARKS = [
  { id: 1, kind: 'editor-note',  title: 'Open ch.14 colder than you want to', severity: 'strong',
    body: 'Your instinct is to warm the reader up to Mira before the horn. Don\'t. The whole chapter is about her being unready — let the prose reflect that. One sentence of weather, then the horn. Trust your reader.',
    from: 'Your last three drafts all buried the inciting moment. This is the fourth. Try cold.',
    actions: ['Draft the cold open', 'Show me both versions', 'Dismiss'] },
  { id: 2, kind: 'what-if',     title: 'What if Rook arrives earlier?', severity: 'medium',
    body: 'You had Rook entering in ch.16 to complicate the parley. But if he arrives in ch.14 — right after the horn — the sword-taking scene becomes a three-person scene. Mira, her dying father, her half-brother she doesn\'t know is her half-brother.',
    from: 'Noticed the father-scene reads a little thin. Rook\'s presence would add weight without adding words.',
    actions: ['Try the scene with Rook', 'Keep as-is', 'Remind me in a week'] },
  { id: 3, kind: 'contradiction', title: 'Mira says she hates horses in ch.14. She rode one in ch.6.', severity: 'strong',
    body: 'In ch.6 you wrote "She took the grey mare, the one that remembered her." In today\'s draft: "She had always hated horses." These can both be true if the ch.6 mare is her father\'s (she tolerates it for him). Worth a single line to reconcile, or flip one.',
    from: 'Flagged by the Canon Weaver three minutes ago.',
    actions: ['Open in Weaver', 'Add reconciling line', 'Ignore'] },
  { id: 4, kind: 'voice',       title: 'Your voice has drifted warmer',  severity: 'medium',
    body: 'The last four chapters are 8% more lyrical than your Book-1 baseline. This might be intentional (Book 2 is more interior). But the prologue you promised Jess is in Book-1 voice — if you draft it today, you may want to nudge the Voice dial back to "Book 1 — Mira" first.',
    from: 'Measured against the Voice Studio baseline you set on Sept 3.',
    actions: ['Switch voice', 'Keep drift', 'Show voice diff'] },
  { id: 5, kind: 'discovery',    title: 'You\'ve never written Edrick alone', severity: 'light',
    body: 'Every scene with Edrick also has Mira or Rook in it. He has no interior monologue in your book. That might be the right call for a mystery figure — or an oversight. A 400-word interior passage could unlock a lot.',
    from: 'Cross-referenced dialogue presence against POV presence.',
    actions: ['Write a 400-word scene', 'Interview Edrick', 'Intentional — dismiss'] },
  { id: 6, kind: 'discovery',    title: 'Autumn arrives in ch.4 and never leaves', severity: 'light',
    body: 'Your book spans 18 months of story time. But the weather in chapters 4–14 is all autumnal — leaves, mist, cold mornings. You have no spring or summer scenes after ch.3. Is that a choice?',
    from: 'Weather words counted across chapters.',
    actions: ['See the heatmap', 'Intentional — dismiss'] },
  { id: 7, kind: 'what-if',     title: 'What if Tobyn dies in ch.13, not ch.18?',   severity: 'medium',
    body: 'You\'ve been weighing this. If he goes in ch.13 — before the parley — Mira faces Edrick without a compass. Louder grief, smaller book. If he goes in ch.18, the loss is slower and the book has its planned climax.',
    from: 'You\'ve asked the Loom about this three times since September.',
    actions: ['Sketch both timelines', 'Stop asking — stick with 18', 'Stop asking — move to 13'] },
];

const STREAK = Array.from({ length: 21 }, (_, i) => {
  const vals = [1200, 800, 1500, 0, 900, 1600, 1100, 1800, 1300, 0, 950, 1450, 1700, 1250, 0, 1100, 1350, 1500, 1600, 1240, null];
  return { day: i, words: vals[i] };
});

const KIND_META = {
  'editor-note':   { icon: '✎', color: 'oklch(78% 0.13 78)',  label: 'Editor note' },
  'what-if':       { icon: '?', color: 'oklch(72% 0.10 200)', label: 'What if' },
  'contradiction': { icon: '!', color: 'oklch(70% 0.15 25)',  label: 'Canon flag' },
  'voice':         { icon: '≈', color: 'oklch(70% 0.13 300)', label: 'Voice drift' },
  'discovery':     { icon: '◇', color: 'oklch(72% 0.13 145)', label: 'Discovery' },
};

const SEVERITY_META = {
  strong: { dot: '●●●', color: 'oklch(70% 0.15 25)',  label: 'Urgent'   },
  medium: { dot: '●●○', color: 'oklch(78% 0.13 78)',  label: 'Worth it' },
  light:  { dot: '●○○', color: 'oklch(72% 0.13 145)', label: 'For later' },
};

function App() {
  const t = useTheme();
  const [filter, setFilter] = React.useState('all');
  const [dismissed, setDismissed] = React.useState(new Set());
  const [focused, setFocused] = React.useState(null);

  const kinds = ['all', 'editor-note', 'what-if', 'contradiction', 'voice', 'discovery'];
  const filteredSparks = SPARKS.filter(s => (filter === 'all' || s.kind === filter) && !dismissed.has(s.id));
  const focusedSpark = focused ? SPARKS.find(s => s.id === focused) : null;

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden', background: t.bg, color: t.ink, fontFamily: t.font }}>
      {/* Sidebar */}
      <aside style={{ width: 240, background: t.sidebar, borderRight: `1px solid ${t.rule}`, padding: '20px 14px', flexShrink: 0, display: 'flex', flexDirection: 'column' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, paddingBottom: 14, borderBottom: `1px solid ${t.rule}`, marginBottom: 14 }}>
          <div style={{ width: 32, height: 32, background: t.accent, color: t.onAccent, fontFamily: t.display, fontWeight: 600, display: 'grid', placeItems: 'center', fontSize: 15, borderRadius: 2 }}>L<span style={{ fontSize: 13, opacity: 0.6 }}>w</span></div>
          <div>
            <div style={{ fontFamily: t.display, fontWeight: 500, fontSize: 15, color: t.ink }}>Loomwright</div>
            <div style={{ fontFamily: t.mono, fontSize: 9, color: t.accent, letterSpacing: 0.14, textTransform: 'uppercase', marginTop: 2 }}>Daily Spark</div>
          </div>
        </div>

        <div style={{ fontFamily: t.mono, fontSize: 9, color: t.ink3, letterSpacing: 0.14, textTransform: 'uppercase', marginBottom: 4 }}>Today</div>
        <div style={{ fontFamily: t.display, fontSize: 16, color: t.ink, fontWeight: 500 }}>{TODAY.day}</div>
        <div style={{ fontSize: 12, color: t.ink3 }}>{TODAY.date}</div>
        <div style={{ marginTop: 12, padding: 12, background: t.paper, border: `1px solid ${t.rule}`, borderRadius: t.radius }}>
          <div style={{ fontFamily: t.mono, fontSize: 9, color: t.ink3, letterSpacing: 0.14, textTransform: 'uppercase', marginBottom: 4 }}>Streak</div>
          <div style={{ fontFamily: t.display, fontSize: 26, color: t.ink, fontWeight: 500 }}>{TODAY.streak} <span style={{ fontSize: 12, color: t.ink3, fontWeight: 400 }}>days</span></div>
          <div style={{ display: 'flex', gap: 2, marginTop: 8, height: 28, alignItems: 'flex-end' }}>
            {STREAK.map((d, i) => (
              <div key={i} title={d.words === null ? 'today' : d.words ? d.words + ' words' : 'rest'} style={{
                flex: 1, height: d.words === null ? 4 : (d.words ? (d.words / 1800) * 100 + '%' : 4) || 4,
                background: d.words === null ? t.accent : (d.words ? t.good : t.rule),
                opacity: d.words === null ? 1 : 0.75,
                borderRadius: 1,
              }} />
            ))}
          </div>
          <div style={{ fontFamily: t.mono, fontSize: 9, color: t.ink3, letterSpacing: 0.1, marginTop: 6 }}>21 DAYS · TODAY PENDING</div>
        </div>

        <div style={{ fontFamily: t.mono, fontSize: 9, color: t.ink3, letterSpacing: 0.14, textTransform: 'uppercase', marginTop: 18, marginBottom: 8 }}>Filter</div>
        {kinds.map(k => {
          const meta = KIND_META[k];
          return (
            <button key={k} onClick={() => setFilter(k)} style={{
              display: 'block', width: '100%', textAlign: 'left',
              padding: '7px 10px', marginBottom: 2,
              background: filter === k ? t.paper : 'transparent',
              border: 'none', borderLeft: filter === k ? `2px solid ${meta ? meta.color : t.accent}` : '2px solid transparent',
              cursor: 'pointer', color: filter === k ? t.ink : t.ink2,
              display: 'flex', alignItems: 'center', gap: 8,
            }}>
              {meta && <span style={{ width: 8, height: 8, background: meta.color, borderRadius: '50%' }} />}
              <span style={{ flex: 1, fontSize: 12 }}>{k === 'all' ? 'All sparks' : meta.label}</span>
              <span style={{ fontFamily: t.mono, fontSize: 10, color: t.ink3 }}>{k === 'all' ? SPARKS.length : SPARKS.filter(s => s.kind === k).length}</span>
            </button>
          );
        })}

        <div style={{ marginTop: 'auto', paddingTop: 14, borderTop: `1px solid ${t.rule}` }}>
          <div style={{ fontFamily: t.mono, fontSize: 9, color: t.ink3, letterSpacing: 0.12, textTransform: 'uppercase', marginBottom: 4 }}>Cadence</div>
          <select style={{ width: '100%', padding: '5px 8px', background: t.bg, color: t.ink, border: `1px solid ${t.rule}`, borderRadius: t.radius, fontSize: 11 }}>
            <option>Daily · 7:30 AM</option>
            <option>Every other day</option>
            <option>Weekly · Monday</option>
            <option>Only when I open Loomwright</option>
          </select>
        </div>
      </aside>

      {/* Main */}
      <main style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0, overflow: 'hidden' }}>
        <header style={{ padding: '18px 32px 14px', borderBottom: `1px solid ${t.rule}`, flexShrink: 0 }}>
          <div style={{ display: 'flex', alignItems: 'flex-end', gap: 16 }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontFamily: t.mono, fontSize: 9, color: t.accent, letterSpacing: 0.14, textTransform: 'uppercase' }}>Good morning, Jess</div>
              <h1 style={{ fontFamily: "'Fraunces', serif", fontSize: 30, fontWeight: 500, letterSpacing: -0.015, margin: '6px 0 0', color: t.ink, lineHeight: 1.15 }}>
                Seven sparks. <span style={{ color: t.ink3, fontStyle: 'italic' }}>One is worth your coffee.</span>
              </h1>
            </div>
            <ThemeToggle />
          </div>
        </header>

        <div style={{ flex: 1, display: 'grid', gridTemplateColumns: focusedSpark ? '1fr 420px' : '1fr', minHeight: 0 }}>
          <div style={{ overflowY: 'auto', padding: '24px 32px' }}>
            <div style={{ display: 'grid', gap: 12, maxWidth: 820 }}>
              {filteredSparks.map(spark => (
                <SparkCard key={spark.id} spark={spark}
                  onOpen={() => setFocused(spark.id)}
                  onDismiss={() => setDismissed(s => new Set([...s, spark.id]))}
                  isOpen={focused === spark.id} />
              ))}
              {filteredSparks.length === 0 && (
                <div style={{ padding: 40, textAlign: 'center', color: t.ink3, fontStyle: 'italic' }}>No sparks match this filter. Try "all".</div>
              )}
            </div>

            {/* Footer cadence note */}
            <div style={{ maxWidth: 820, marginTop: 24, padding: 16, background: t.paper2, border: `1px dashed ${t.rule}`, borderRadius: t.radius, fontSize: 12, color: t.ink3, lineHeight: 1.6 }}>
              Sparks are generated once a day at 7:30 AM from overnight noticings, your draft activity, and anything flagged by the Canon Weaver. They never push — they wait here for you. <em style={{ color: t.ink2 }}>Nothing is acted on without your say-so.</em>
            </div>
          </div>

          {focusedSpark && <SparkInspector spark={focusedSpark} onClose={() => setFocused(null)} />}
        </div>
      </main>
    </div>
  );
}

function SparkCard({ spark, onOpen, onDismiss, isOpen }) {
  const t = useTheme();
  const meta = KIND_META[spark.kind];
  const sev = SEVERITY_META[spark.severity];
  return (
    <div onClick={onOpen} style={{
      padding: 18, cursor: 'pointer',
      background: t.paper,
      border: `1px solid ${isOpen ? meta.color : t.rule}`,
      borderLeft: `3px solid ${meta.color}`,
      borderRadius: t.radius,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
        <div style={{ width: 22, height: 22, background: meta.color, color: 'rgba(0,0,0,0.7)', display: 'grid', placeItems: 'center', fontFamily: t.display, fontWeight: 600, fontSize: 13, borderRadius: 2 }}>{meta.icon}</div>
        <span style={{ fontFamily: t.mono, fontSize: 9, color: meta.color, letterSpacing: 0.14, textTransform: 'uppercase' }}>{meta.label}</span>
        <span style={{ flex: 1 }} />
        <span style={{ fontFamily: t.mono, fontSize: 9, color: sev.color, letterSpacing: 0.1 }}>{sev.dot} {sev.label.toUpperCase()}</span>
      </div>
      <div style={{ fontFamily: "'Fraunces', serif", fontSize: 18, fontWeight: 500, color: t.ink, letterSpacing: -0.01, lineHeight: 1.25, marginBottom: 8 }}>{spark.title}</div>
      <div style={{ fontSize: 13, color: t.ink2, lineHeight: 1.65, maxWidth: '60ch' }}>{spark.body}</div>
      <div style={{ display: 'flex', gap: 6, marginTop: 12, flexWrap: 'wrap' }}>
        {spark.actions.map((a, i) => (
          <button key={a} onClick={(e) => { e.stopPropagation(); if (a.toLowerCase().includes('dismiss') || a.toLowerCase().includes('intentional')) onDismiss(); }} style={{
            padding: '6px 11px',
            background: i === 0 ? meta.color : 'transparent',
            color: i === 0 ? t.onAccent : t.ink2,
            border: i === 0 ? 'none' : `1px solid ${t.rule}`, borderRadius: t.radius,
            fontFamily: t.mono, fontSize: 10, letterSpacing: 0.1, textTransform: 'uppercase', cursor: 'pointer',
          }}>{a}</button>
        ))}
      </div>
    </div>
  );
}

function SparkInspector({ spark, onClose }) {
  const t = useTheme();
  const meta = KIND_META[spark.kind];
  return (
    <aside style={{ borderLeft: `1px solid ${t.rule}`, background: t.paper, overflowY: 'auto', padding: 22 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <span style={{ width: 10, height: 10, background: meta.color, borderRadius: '50%' }} />
        <span style={{ fontFamily: t.mono, fontSize: 10, color: meta.color, letterSpacing: 0.14, textTransform: 'uppercase' }}>{meta.label} · Inspector</span>
        <div style={{ flex: 1 }} />
        <button onClick={onClose} style={{ background: 'transparent', border: 'none', color: t.ink3, cursor: 'pointer', fontSize: 16 }}>×</button>
      </div>
      <h3 style={{ fontFamily: "'Fraunces', serif", fontSize: 22, fontWeight: 500, margin: '10px 0', color: t.ink, lineHeight: 1.25 }}>{spark.title}</h3>
      <div style={{ fontSize: 13, color: t.ink2, lineHeight: 1.7, marginBottom: 14 }}>{spark.body}</div>

      <div style={{ padding: 12, background: t.bg, border: `1px solid ${t.rule}`, borderRadius: t.radius, marginBottom: 14 }}>
        <div style={{ fontFamily: t.mono, fontSize: 9, color: t.ink3, letterSpacing: 0.14, textTransform: 'uppercase', marginBottom: 4 }}>Why the Loom raised this</div>
        <div style={{ fontSize: 12, color: t.ink2, fontStyle: 'italic', lineHeight: 1.55 }}>{spark.from}</div>
      </div>

      {spark.kind === 'editor-note' && (
        <div style={{ padding: 14, background: t.paper2, border: `1px dashed ${meta.color}`, borderRadius: t.radius, marginBottom: 14 }}>
          <div style={{ fontFamily: t.mono, fontSize: 9, color: meta.color, letterSpacing: 0.14, textTransform: 'uppercase', marginBottom: 6 }}>Loom cold-open draft</div>
          <div style={{ fontFamily: "'Fraunces', serif", fontSize: 14, color: t.ink, lineHeight: 1.7, fontStyle: 'italic' }}>
            The valley was still. The horn sounded thrice. Mira moved.
          </div>
          <div style={{ fontFamily: t.mono, fontSize: 9, color: t.ink3, letterSpacing: 0.1, marginTop: 8 }}>12 WORDS · YOUR ORIGINAL: 41</div>
        </div>
      )}

      {spark.kind === 'what-if' && (
        <div style={{ padding: 14, background: t.paper2, border: `1px dashed ${meta.color}`, borderRadius: t.radius, marginBottom: 14 }}>
          <div style={{ fontFamily: t.mono, fontSize: 9, color: meta.color, letterSpacing: 0.14, textTransform: 'uppercase', marginBottom: 6 }}>Downstream effects</div>
          <div style={{ fontSize: 12, color: t.ink2, lineHeight: 1.55 }}>
            <div style={{ padding: '4px 0', borderTop: `1px solid ${t.rule}` }}>· Rook\'s ch.16 entrance becomes a return, not a debut</div>
            <div style={{ padding: '4px 0', borderTop: `1px solid ${t.rule}` }}>· The sword-taking scene gains a witness — complicates chapter\'s POV</div>
            <div style={{ padding: '4px 0', borderTop: `1px solid ${t.rule}` }}>· Mira\'s "I must leave" monologue would need to move to ch.15</div>
          </div>
        </div>
      )}

      <div style={{ fontFamily: t.mono, fontSize: 9, color: t.ink3, letterSpacing: 0.14, textTransform: 'uppercase', marginBottom: 6 }}>Take action</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
        {spark.actions.map((a, i) => (
          <button key={a} style={{
            padding: '8px 12px', textAlign: 'left',
            background: i === 0 ? meta.color : 'transparent',
            color: i === 0 ? t.onAccent : t.ink2,
            border: i === 0 ? 'none' : `1px solid ${t.rule}`, borderRadius: t.radius,
            fontFamily: t.display, fontSize: 13, fontWeight: 500, cursor: 'pointer',
          }}>{a}</button>
        ))}
      </div>

      <div style={{ marginTop: 18, paddingTop: 14, borderTop: `1px solid ${t.rule}`, fontFamily: t.mono, fontSize: 9, color: t.ink3, letterSpacing: 0.12, textTransform: 'uppercase' }}>
        Mark as · seen / snooze 1 day / snooze 1 week / never again
      </div>
    </aside>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ThemeProvider><App /></ThemeProvider>);
</script>
</body>
</html>
