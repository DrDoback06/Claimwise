<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Loomwright — Atlas AI</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,400;9..144,0,500;9..144,0,600;9..144,1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; height:100%; overflow:hidden; }
  *::-webkit-scrollbar { width:8px; height:8px; } *::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.3); border-radius:4px; }
  button, input, select, textarea { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="proto/theme.jsx"></script>
<script type="text/babel">

// A 14th-century-ish ink-wash region with places, routes, and floorplans.
const REGION = {
  name: 'The Vale & Thornmarch',
  boundsMi: { w: 96, h: 72 },
  places: [
    { id: 'valehall',  name: 'Vale Hall',         kind: 'castle',  x: 24, y: 44, ch: [1,2,4,14], mentions: 34, note: 'Mira\'s home. Built against the north ridge.' },
    { id: 'thornmoot', name: 'Thornmoot',         kind: 'city',    x: 72, y: 24, ch: [5,6,10],   mentions: 18, note: 'Edrick\'s seat.' },
    { id: 'greymouth', name: 'Greymouth',         kind: 'town',    x: 42, y: 62, ch: [3,7],      mentions: 9,  note: 'Market town at the river mouth.' },
    { id: 'burning',   name: 'The Burning Field', kind: 'ruin',    x: 55, y: 48, ch: [9,13],     mentions: 7,  note: 'Tobyn\'s secret. Site of Book 1 finale.' },
    { id: 'eastridge', name: 'East Ridge',        kind: 'feature', x: 66, y: 36, ch: [14],       mentions: 3,  note: 'First mentioned today.' },
    { id: 'oldfane',   name: 'Oldfane',           kind: 'shrine',  x: 32, y: 18, ch: [2,11],     mentions: 6,  note: 'Where Mira hears the old tongue.' },
  ],
  roads: [
    { from: 'valehall', to: 'greymouth' },
    { from: 'greymouth', to: 'thornmoot' },
    { from: 'valehall', to: 'oldfane' },
    { from: 'oldfane', to: 'thornmoot' },
  ],
  river: 'M 0 55 Q 20 60 35 58 T 60 62 T 96 60',
  mountains: 'M 0 10 L 14 4 L 24 14 L 32 6 L 46 16 L 58 8 L 70 18 L 82 10 L 96 22',
};

// Floorplan — Vale Hall ground floor, ch.1+14 set pieces
const FLOORPLAN = {
  place: 'Vale Hall · Ground floor',
  w: 480, h: 300,
  rooms: [
    { name: 'Great Hall',    x: 80,  y: 40,  w: 180, h: 140, note: 'The sword hangs above the mantel.' },
    { name: 'Kitchen',       x: 80,  y: 180, w: 100, h: 80 },
    { name: 'Larder',        x: 180, y: 180, w: 80,  h: 80 },
    { name: 'Armoury',       x: 260, y: 40,  w: 80,  h: 80 },
    { name: 'Tobyn\'s Study', x: 260, y: 120, w: 80, h: 60, note: 'Prophecy kept here — hidden beneath a loose tile.' },
    { name: 'Courtyard',     x: 260, y: 180, w: 120, h: 80, note: 'The horn is mounted on the east wall.' },
    { name: 'Father\'s Room', x: 340, y: 40, w: 80, h: 80, note: 'He has been here for three weeks.' },
  ],
  doors: [ { x: 160, y: 180 }, { x: 220, y: 180 }, { x: 260, y: 100 }, { x: 260, y: 160 }, { x: 340, y: 80 } ],
  pins: [
    { x: 100,  y: 60,  label: 'Mira enters', ch: 1,  color: 'oklch(78% 0.13 78)' },
    { x: 240,  y: 170, label: 'Sword taken', ch: 14, color: 'oklch(70% 0.15 25)' },
    { x: 380,  y: 80,  label: 'Father\'s line', ch: 14, color: 'oklch(72% 0.13 145)' },
    { x: 320,  y: 220, label: 'Horn sounds', ch: 14, color: 'oklch(72% 0.10 200)' },
  ],
};

// "Propose new place" — ghost candidates the Loom spotted in prose
const PROPOSALS = [
  { name: 'East Ridge',         whereInText: 'ch.14 ¶3: "the east ridge"',    coord: { x: 66, y: 36 }, confidence: 'high',   kind: 'feature' },
  { name: 'The Shepherd\'s Rest', whereInText: 'ch.11 ¶18: "that cold inn"',  coord: { x: 50, y: 30 }, confidence: 'medium', kind: 'inn', note: 'Might be the same as "Greymouth Inn" — merge?' },
  { name: 'The Unnamed Chapel', whereInText: 'ch.7 ¶12: "a half-burnt chapel"', coord: { x: 28, y: 30 }, confidence: 'low',    kind: 'shrine' },
];

const KIND_COLORS = {
  castle:  'oklch(70% 0.15 25)',
  city:    'oklch(72% 0.10 200)',
  town:    'oklch(78% 0.13 78)',
  ruin:    'oklch(60% 0.04 60)',
  shrine:  'oklch(70% 0.13 300)',
  feature: 'oklch(72% 0.13 145)',
  inn:     'oklch(78% 0.13 78)',
};

function App() {
  const t = useTheme();
  const [tab, setTab] = React.useState('map');
  const [selected, setSelected] = React.useState('valehall');
  const [showProposals, setShowProposals] = React.useState(true);
  const [hoveredRoom, setHoveredRoom] = React.useState(null);

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden', background: t.bg, color: t.ink, fontFamily: t.font }}>
      <aside style={{ width: 240, background: t.sidebar, borderRight: `1px solid ${t.rule}`, padding: '20px 14px', flexShrink: 0, display: 'flex', flexDirection: 'column' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, paddingBottom: 14, borderBottom: `1px solid ${t.rule}`, marginBottom: 14 }}>
          <div style={{ width: 32, height: 32, background: t.accent, color: t.onAccent, fontFamily: t.display, fontWeight: 600, display: 'grid', placeItems: 'center', fontSize: 15, borderRadius: 2 }}>L<span style={{ fontSize: 13, opacity: 0.6 }}>w</span></div>
          <div>
            <div style={{ fontFamily: t.display, fontWeight: 500, fontSize: 15, color: t.ink }}>Loomwright</div>
            <div style={{ fontFamily: t.mono, fontSize: 9, color: t.accent, letterSpacing: 0.14, textTransform: 'uppercase', marginTop: 2 }}>Atlas AI</div>
          </div>
        </div>

        <div style={{ display: 'flex', gap: 4, marginBottom: 14, padding: 3, background: t.paper, border: `1px solid ${t.rule}`, borderRadius: t.radius }}>
          {[{ id: 'map', l: 'Region' }, { id: 'floor', l: 'Floorplan' }, { id: 'generate', l: 'Generate' }].map(m => (
            <button key={m.id} onClick={() => setTab(m.id)} style={{
              flex: 1, padding: '6px 8px',
              background: tab === m.id ? t.accent : 'transparent',
              color: tab === m.id ? t.onAccent : t.ink2,
              border: 'none', borderRadius: 2,
              fontFamily: t.mono, fontSize: 10, letterSpacing: 0.12, textTransform: 'uppercase', cursor: 'pointer',
            }}>{m.l}</button>
          ))}
        </div>

        <div style={{ fontFamily: t.mono, fontSize: 9, color: t.ink3, letterSpacing: 0.14, textTransform: 'uppercase', marginBottom: 8 }}>Places · {REGION.places.length}</div>
        <div style={{ flex: 1, overflowY: 'auto' }}>
          {REGION.places.map(p => (
            <button key={p.id} onClick={() => setSelected(p.id)} style={{
              display: 'flex', alignItems: 'center', gap: 8,
              width: '100%', textAlign: 'left', padding: '6px 8px', marginBottom: 2,
              background: selected === p.id ? t.paper : 'transparent',
              border: 'none', borderLeft: selected === p.id ? `2px solid ${KIND_COLORS[p.kind]}` : '2px solid transparent',
              cursor: 'pointer', color: t.ink,
            }}>
              <span style={{ width: 8, height: 8, background: KIND_COLORS[p.kind], borderRadius: '50%', flexShrink: 0 }} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontFamily: t.display, fontSize: 13, fontWeight: 500, color: t.ink }}>{p.name}</div>
                <div style={{ fontFamily: t.mono, fontSize: 9, color: t.ink3, letterSpacing: 0.1, textTransform: 'uppercase' }}>{p.kind} · {p.mentions} ments</div>
              </div>
            </button>
          ))}
        </div>

        <div style={{ marginTop: 14, paddingTop: 12, borderTop: `1px solid ${t.rule}` }}>
          <label style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer', padding: '4px 0' }}>
            <input type="checkbox" checked={showProposals} onChange={e => setShowProposals(e.target.checked)} />
            <span style={{ fontFamily: t.mono, fontSize: 10, color: t.ink2, letterSpacing: 0.12, textTransform: 'uppercase' }}>Show proposals</span>
          </label>
          <div style={{ fontFamily: t.mono, fontSize: 9, color: t.ink3, letterSpacing: 0.1, marginTop: 4 }}>{PROPOSALS.length} CANDIDATES FOUND IN PROSE</div>
        </div>
      </aside>

      <main style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0, overflow: 'hidden' }}>
        <header style={{ padding: '14px 28px', borderBottom: `1px solid ${t.rule}`, display: 'flex', alignItems: 'center', gap: 14, flexShrink: 0 }}>
          <div>
            <div style={{ fontFamily: t.mono, fontSize: 9, color: t.accent, letterSpacing: 0.14, textTransform: 'uppercase' }}>Atlas · {tab === 'map' ? REGION.name : tab === 'floor' ? FLOORPLAN.place : 'Generate'}</div>
            <div style={{ fontFamily: t.display, fontSize: 20, fontWeight: 500, marginTop: 2, color: t.ink }}>
              {tab === 'map' && 'Regional map'}
              {tab === 'floor' && 'Floorplan'}
              {tab === 'generate' && 'Generate a place from prose'}
            </div>
          </div>
          <div style={{ flex: 1 }} />
          <button style={{ padding: '6px 12px', background: 'transparent', color: t.ink2, border: `1px solid ${t.rule}`, borderRadius: t.radius, fontFamily: t.mono, fontSize: 10, letterSpacing: 0.1, textTransform: 'uppercase', cursor: 'pointer' }}>↓ Export PNG</button>
          <ThemeToggle />
        </header>

        {tab === 'map'      && <MapView selected={selected} setSelected={setSelected} showProposals={showProposals} />}
        {tab === 'floor'    && <FloorView hovered={hoveredRoom} setHovered={setHoveredRoom} />}
        {tab === 'generate' && <GenerateView />}
      </main>
    </div>
  );
}

function MapView({ selected, setSelected, showProposals }) {
  const t = useTheme();
  const place = REGION.places.find(p => p.id === selected);
  return (
    <div style={{ flex: 1, display: 'grid', gridTemplateColumns: '1fr 340px', minHeight: 0 }}>
      <div style={{ overflow: 'hidden', position: 'relative', background: t.mode === 'night' ? '#0a0e12' : '#ece3ca' }}>
        <svg viewBox="0 0 96 72" style={{ width: '100%', height: '100%', display: 'block' }} preserveAspectRatio="xMidYMid meet">
          {/* Paper texture via gradient */}
          <defs>
            <radialGradient id="vignette" cx="50%" cy="50%" r="65%">
              <stop offset="0%" stopColor={t.mode === 'night' ? '#111a22' : '#f0e8cf'} stopOpacity="0" />
              <stop offset="100%" stopColor={t.mode === 'night' ? '#050709' : '#c4b688'} stopOpacity="0.5" />
            </radialGradient>
            <pattern id="hatch" width="1.5" height="1.5" patternUnits="userSpaceOnUse" patternTransform="rotate(25)">
              <line x1="0" y1="0" x2="0" y2="1.5" stroke={t.ink3} strokeWidth="0.08" opacity="0.35" />
            </pattern>
          </defs>
          <rect width="96" height="72" fill="url(#vignette)" />
          {/* Mountains — repeated darker + lighter */}
          <path d={REGION.mountains} fill="none" stroke={t.ink} strokeWidth="0.22" opacity="0.6" />
          <path d="M 0 20 L 14 14 L 24 22 L 32 16 L 46 24 L 58 18 L 70 26 L 82 18 L 96 30" fill="none" stroke={t.ink} strokeWidth="0.18" opacity="0.35" />
          <rect x="0" y="0" width="96" height="22" fill="url(#hatch)" opacity="0.5" />
          {/* River */}
          <path d={REGION.river} fill="none" stroke={t.mode === 'night' ? 'oklch(55% 0.07 220)' : 'oklch(55% 0.08 220)'} strokeWidth="0.6" strokeLinecap="round" />
          <path d={REGION.river} fill="none" stroke={t.mode === 'night' ? 'oklch(65% 0.09 220)' : 'oklch(65% 0.08 220)'} strokeWidth="0.2" strokeLinecap="round" />
          {/* Roads */}
          {REGION.roads.map((r, i) => {
            const a = REGION.places.find(p => p.id === r.from);
            const b = REGION.places.find(p => p.id === r.to);
            return <line key={i} x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke={t.ink3} strokeWidth="0.15" strokeDasharray="0.6 0.4" opacity="0.7" />;
          })}
          {/* Places */}
          {REGION.places.map(p => {
            const active = selected === p.id;
            return (
              <g key={p.id} onClick={() => setSelected(p.id)} style={{ cursor: 'pointer' }}>
                {active && <circle cx={p.x} cy={p.y} r="3" fill={KIND_COLORS[p.kind]} opacity="0.18" />}
                <circle cx={p.x} cy={p.y} r={p.kind === 'city' || p.kind === 'castle' ? 1.1 : 0.7} fill={KIND_COLORS[p.kind]} stroke={t.ink} strokeWidth="0.15" />
                <text x={p.x + 1.5} y={p.y + 0.5} fontSize={p.kind === 'city' || p.kind === 'castle' ? 2.2 : 1.6} fill={t.ink} fontFamily="'Fraunces', serif" fontStyle="italic">{p.name}</text>
              </g>
            );
          })}
          {/* Proposals (ghost) */}
          {showProposals && PROPOSALS.map((pr, i) => (
            <g key={i} opacity="0.75">
              <circle cx={pr.coord.x} cy={pr.coord.y} r="0.8" fill="none" stroke={t.accent} strokeWidth="0.15" strokeDasharray="0.3 0.2" />
              <text x={pr.coord.x + 1.3} y={pr.coord.y + 0.3} fontSize="1.4" fill={t.accent} fontFamily="'JetBrains Mono', monospace">{pr.name}?</text>
            </g>
          ))}
          {/* Compass */}
          <g transform="translate(88, 66)">
            <circle r="2.8" fill="none" stroke={t.ink2} strokeWidth="0.12" />
            <line x1="0" y1="-2.2" x2="0" y2="2.2" stroke={t.ink2} strokeWidth="0.12" />
            <line x1="-2.2" y1="0" x2="2.2" y2="0" stroke={t.ink2} strokeWidth="0.12" />
            <text y="-1" fontSize="1.4" fill={t.ink2} textAnchor="middle" fontFamily="'Fraunces', serif">N</text>
          </g>
          {/* Scale */}
          <g transform="translate(6, 66)">
            <line x1="0" y1="0" x2="10" y2="0" stroke={t.ink2} strokeWidth="0.18" />
            <line x1="0" y1="-0.4" x2="0" y2="0.4" stroke={t.ink2} strokeWidth="0.18" />
            <line x1="10" y1="-0.4" x2="10" y2="0.4" stroke={t.ink2} strokeWidth="0.18" />
            <text x="5" y="-0.8" fontSize="1.2" fill={t.ink2} textAnchor="middle" fontFamily="'JetBrains Mono', monospace">10 MI</text>
          </g>
        </svg>
      </div>

      <aside style={{ borderLeft: `1px solid ${t.rule}`, background: t.paper, overflowY: 'auto', padding: 20 }}>
        {place && (
          <>
            <div style={{ fontFamily: t.mono, fontSize: 10, color: KIND_COLORS[place.kind], letterSpacing: 0.14, textTransform: 'uppercase' }}>{place.kind}</div>
            <div style={{ fontFamily: t.display, fontSize: 22, fontWeight: 500, color: t.ink, marginTop: 4 }}>{place.name}</div>
            <div style={{ fontSize: 13, color: t.ink2, lineHeight: 1.65, marginTop: 8, fontStyle: 'italic' }}>{place.note}</div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8, marginTop: 14 }}>
              {[
                { k: 'Chapters', v: place.ch.join(', ') },
                { k: 'Mentions', v: place.mentions },
                { k: 'First appears', v: 'ch.' + Math.min(...place.ch) },
                { k: 'Most recent', v: 'ch.' + Math.max(...place.ch) },
              ].map(s => (
                <div key={s.k} style={{ padding: 10, background: t.paper2, border: `1px solid ${t.rule}`, borderRadius: t.radius }}>
                  <div style={{ fontFamily: t.mono, fontSize: 9, color: t.ink3, letterSpacing: 0.14, textTransform: 'uppercase' }}>{s.k}</div>
                  <div style={{ fontFamily: t.display, fontSize: 14, color: t.ink, marginTop: 2 }}>{s.v}</div>
                </div>
              ))}
            </div>
            <div style={{ marginTop: 14, fontFamily: t.mono, fontSize: 9, color: t.ink3, letterSpacing: 0.14, textTransform: 'uppercase', marginBottom: 6 }}>Quick actions</div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
              <button style={{ padding: '7px 11px', textAlign: 'left', background: t.accent, color: t.onAccent, border: 'none', borderRadius: t.radius, fontFamily: t.display, fontSize: 12, fontWeight: 500, cursor: 'pointer' }}>Generate floorplan</button>
              <button style={{ padding: '7px 11px', textAlign: 'left', background: 'transparent', color: t.ink2, border: `1px solid ${t.rule}`, borderRadius: t.radius, fontFamily: t.display, fontSize: 12, cursor: 'pointer' }}>Describe the approach in prose</button>
              <button style={{ padding: '7px 11px', textAlign: 'left', background: 'transparent', color: t.ink2, border: `1px solid ${t.rule}`, borderRadius: t.radius, fontFamily: t.display, fontSize: 12, cursor: 'pointer' }}>See all mentions</button>
              <button style={{ padding: '7px 11px', textAlign: 'left', background: 'transparent', color: t.ink2, border: `1px solid ${t.rule}`, borderRadius: t.radius, fontFamily: t.display, fontSize: 12, cursor: 'pointer' }}>→ To Canon Weaver</button>
            </div>
          </>
        )}

        {showProposals && (
          <div style={{ marginTop: 20, paddingTop: 14, borderTop: `1px solid ${t.rule}` }}>
            <div style={{ fontFamily: t.mono, fontSize: 10, color: t.accent, letterSpacing: 0.14, textTransform: 'uppercase', marginBottom: 6 }}>✦ Proposed by the Loom</div>
            {PROPOSALS.map((pr, i) => (
              <div key={i} style={{ padding: 10, marginBottom: 5, background: t.paper2, border: `1px dashed ${t.accent}`, borderRadius: t.radius }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                  <span style={{ fontFamily: t.display, fontSize: 13, fontWeight: 500, color: t.ink }}>{pr.name}</span>
                  <span style={{ marginLeft: 'auto', fontFamily: t.mono, fontSize: 8, padding: '1px 5px', border: `1px solid ${t.rule}`, color: t.ink3, borderRadius: 1, letterSpacing: 0.12, textTransform: 'uppercase' }}>{pr.confidence}</span>
                </div>
                <div style={{ fontSize: 11, color: t.ink3, marginTop: 3 }}>{pr.whereInText}</div>
                {pr.note && <div style={{ fontSize: 11, color: t.warn, marginTop: 3, fontStyle: 'italic' }}>{pr.note}</div>}
                <div style={{ display: 'flex', gap: 4, marginTop: 6 }}>
                  <button style={{ padding: '3px 8px', background: t.accent, color: t.onAccent, border: 'none', borderRadius: 1, fontFamily: t.mono, fontSize: 9, letterSpacing: 0.1, textTransform: 'uppercase', cursor: 'pointer' }}>Add to atlas</button>
                  <button style={{ padding: '3px 8px', background: 'transparent', color: t.ink3, border: `1px solid ${t.rule}`, borderRadius: 1, fontFamily: t.mono, fontSize: 9, letterSpacing: 0.1, textTransform: 'uppercase', cursor: 'pointer' }}>Merge</button>
                  <button style={{ padding: '3px 8px', background: 'transparent', color: t.ink3, border: `1px solid ${t.rule}`, borderRadius: 1, fontFamily: t.mono, fontSize: 9, letterSpacing: 0.1, textTransform: 'uppercase', cursor: 'pointer' }}>Dismiss</button>
                </div>
              </div>
            ))}
          </div>
        )}
      </aside>
    </div>
  );
}

function FloorView({ hovered, setHovered }) {
  const t = useTheme();
  const room = hovered && FLOORPLAN.rooms.find(r => r.name === hovered);
  return (
    <div style={{ flex: 1, display: 'grid', gridTemplateColumns: '1fr 320px', minHeight: 0 }}>
      <div style={{ overflow: 'auto', background: t.mode === 'night' ? '#0a0e12' : '#ece3ca', padding: 40, display: 'grid', placeItems: 'center' }}>
        <svg viewBox={`0 0 ${FLOORPLAN.w} ${FLOORPLAN.h}`} style={{ width: 'min(100%, 760px)', background: t.mode === 'night' ? '#111a22' : '#f5efdc', border: `1px solid ${t.rule}` }}>
          <defs>
            <pattern id="floorhatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
              <line x1="0" y1="0" x2="0" y2="6" stroke={t.ink3} strokeWidth="0.3" opacity="0.2" />
            </pattern>
          </defs>
          {/* Outer wall */}
          <rect x="60" y="20" width="360" height="260" fill="url(#floorhatch)" stroke={t.ink} strokeWidth="2" />
          {/* Rooms */}
          {FLOORPLAN.rooms.map(r => (
            <g key={r.name} onMouseEnter={() => setHovered(r.name)} onMouseLeave={() => setHovered(null)} style={{ cursor: 'pointer' }}>
              <rect x={r.x} y={r.y} width={r.w} height={r.h} fill={hovered === r.name ? t.accentSoft : (t.mode === 'night' ? '#0a0e12' : '#faf3de')} stroke={t.ink} strokeWidth="1.4" />
              <text x={r.x + r.w / 2} y={r.y + r.h / 2 + 4} fontSize="11" fill={t.ink} textAnchor="middle" fontFamily="'Fraunces', serif" fontStyle="italic">{r.name}</text>
            </g>
          ))}
          {/* Door openings — short white cuts */}
          {FLOORPLAN.doors.map((d, i) => (
            <rect key={i} x={d.x - 6} y={d.y - 2} width="12" height="4" fill={t.mode === 'night' ? '#111a22' : '#f5efdc'} />
          ))}
          {/* Pins */}
          {FLOORPLAN.pins.map((p, i) => (
            <g key={i}>
              <circle cx={p.x} cy={p.y} r="6" fill={p.color} opacity="0.25" />
              <circle cx={p.x} cy={p.y} r="3" fill={p.color} stroke={t.ink} strokeWidth="0.8" />
              <text x={p.x + 8} y={p.y + 3} fontSize="10" fill={t.ink} fontFamily="'JetBrains Mono', monospace">ch.{p.ch} · {p.label}</text>
            </g>
          ))}
        </svg>
      </div>
      <aside style={{ borderLeft: `1px solid ${t.rule}`, background: t.paper, overflowY: 'auto', padding: 20 }}>
        <div style={{ fontFamily: t.mono, fontSize: 10, color: t.accent, letterSpacing: 0.14, textTransform: 'uppercase' }}>Floorplan</div>
        <h3 style={{ fontFamily: t.display, fontSize: 20, margin: '4px 0 12px', color: t.ink, fontWeight: 500 }}>{FLOORPLAN.place}</h3>
        <p style={{ fontSize: 13, color: t.ink2, lineHeight: 1.65, margin: '0 0 14px' }}>Generated from your prose. Seven rooms, five door-openings, four scene-pins from chapters 1 &amp; 14. Hover a room for its canon notes; drag rooms to adjust; pins auto-sync with chapter text.</p>

        <div style={{ fontFamily: t.mono, fontSize: 9, color: t.ink3, letterSpacing: 0.14, textTransform: 'uppercase', marginBottom: 6 }}>{hovered ? 'Selected room' : 'Rooms'}</div>
        {room ? (
          <div style={{ padding: 12, background: t.paper2, border: `1px solid ${t.accent}`, borderLeft: `3px solid ${t.accent}`, borderRadius: t.radius }}>
            <div style={{ fontFamily: t.display, fontSize: 15, fontWeight: 500, color: t.ink }}>{room.name}</div>
            {room.note ? <div style={{ fontSize: 12, color: t.ink2, lineHeight: 1.6, marginTop: 5, fontStyle: 'italic' }}>"{room.note}"</div> : <div style={{ fontSize: 11, color: t.ink3, marginTop: 5 }}>No canon notes yet.</div>}
          </div>
        ) : (
          <div style={{ fontSize: 11, color: t.ink3 }}>Hover a room on the plan →</div>
        )}

        <div style={{ marginTop: 16, fontFamily: t.mono, fontSize: 9, color: t.ink3, letterSpacing: 0.14, textTransform: 'uppercase', marginBottom: 6 }}>Pins · chapter events</div>
        {FLOORPLAN.pins.map(p => (
          <div key={p.label} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '5px 0', borderTop: `1px solid ${t.rule}` }}>
            <span style={{ width: 8, height: 8, background: p.color, borderRadius: '50%' }} />
            <span style={{ flex: 1, fontSize: 12, color: t.ink2 }}>{p.label}</span>
            <span style={{ fontFamily: t.mono, fontSize: 10, color: t.ink3 }}>ch.{p.ch}</span>
          </div>
        ))}

        <div style={{ marginTop: 16, display: 'flex', flexDirection: 'column', gap: 4 }}>
          <button style={{ padding: '7px 11px', textAlign: 'left', background: t.accent, color: t.onAccent, border: 'none', borderRadius: t.radius, fontFamily: t.display, fontSize: 12, fontWeight: 500, cursor: 'pointer' }}>+ New room</button>
          <button style={{ padding: '7px 11px', textAlign: 'left', background: 'transparent', color: t.ink2, border: `1px solid ${t.rule}`, borderRadius: t.radius, fontFamily: t.display, fontSize: 12, cursor: 'pointer' }}>Generate upper floor</button>
          <button style={{ padding: '7px 11px', textAlign: 'left', background: 'transparent', color: t.ink2, border: `1px solid ${t.rule}`, borderRadius: t.radius, fontFamily: t.display, fontSize: 12, cursor: 'pointer' }}>Re-read all Vale Hall scenes</button>
        </div>
      </aside>
    </div>
  );
}

function GenerateView() {
  const t = useTheme();
  const [prompt, setPrompt] = React.useState('A half-burnt chapel on the moor, slate roof collapsed, the bell still hanging. Sheep graze inside. Twenty miles north of Thornmoot. It featured briefly in chapter 7.');
  const [kind, setKind] = React.useState('place');
  const [generated, setGenerated] = React.useState(true);
  return (
    <div style={{ flex: 1, overflowY: 'auto', padding: '28px 40px' }}>
      <div style={{ maxWidth: 960 }}>
        <p style={{ fontSize: 13, color: t.ink2, maxWidth: '62ch', lineHeight: 1.65, marginTop: 0 }}>
          Tell the Loom what you want. A region, a town, a floorplan, a battlefield sketch. It reads your existing atlas to stay consistent, proposes a draft, and — only on your say-so — commits it.
        </p>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 18, marginTop: 18 }}>
          <div>
            <div style={{ fontFamily: t.mono, fontSize: 10, color: t.ink3, letterSpacing: 0.14, textTransform: 'uppercase', marginBottom: 6 }}>Description</div>
            <textarea value={prompt} onChange={e => setPrompt(e.target.value)} style={{
              width: '100%', minHeight: 140, padding: 14,
              background: t.paper, color: t.ink,
              border: `1px solid ${t.rule}`, borderRadius: t.radius,
              fontFamily: "'Fraunces', serif", fontSize: 14, lineHeight: 1.7, resize: 'vertical', outline: 'none',
            }} />
            <div style={{ display: 'flex', gap: 6, marginTop: 10, flexWrap: 'wrap' }}>
              {['place', 'region', 'floorplan', 'battlefield'].map(k => (
                <button key={k} onClick={() => setKind(k)} style={{
                  padding: '5px 11px',
                  background: kind === k ? t.accentSoft : 'transparent',
                  color: kind === k ? t.accent : t.ink3,
                  border: `1px solid ${kind === k ? t.accent : t.rule}`, borderRadius: t.radius,
                  fontFamily: t.mono, fontSize: 10, letterSpacing: 0.12, textTransform: 'uppercase', cursor: 'pointer',
                }}>{k}</button>
              ))}
            </div>
            <div style={{ marginTop: 14, padding: 12, background: t.paper2, border: `1px solid ${t.rule}`, borderRadius: t.radius }}>
              <div style={{ fontFamily: t.mono, fontSize: 9, color: t.ink3, letterSpacing: 0.14, textTransform: 'uppercase', marginBottom: 6 }}>Constraints · read from atlas</div>
              <div style={{ fontSize: 12, color: t.ink2, lineHeight: 1.6 }}>
                <div>· North of Thornmoot · within 20 miles</div>
                <div>· Moor terrain (matches ch.7 weather)</div>
                <div>· First mentioned ch.7 ¶12</div>
                <div>· Period: 14th c. chivalric</div>
              </div>
            </div>
            <button onClick={() => setGenerated(true)} style={{ marginTop: 14, padding: '10px 18px', background: t.accent, color: t.onAccent, border: 'none', borderRadius: t.radius, fontFamily: t.display, fontWeight: 500, fontSize: 13, cursor: 'pointer' }}>✦ Generate</button>
          </div>

          <div>
            <div style={{ fontFamily: t.mono, fontSize: 10, color: t.accent, letterSpacing: 0.14, textTransform: 'uppercase', marginBottom: 6 }}>Proposal · draft</div>
            <div style={{ padding: 18, background: t.paper, border: `1px solid ${t.accent}`, borderLeft: `3px solid ${t.accent}`, borderRadius: t.radius }}>
              <div style={{ fontFamily: t.display, fontSize: 18, fontWeight: 500, color: t.ink }}>The Unnamed Chapel</div>
              <div style={{ fontFamily: t.mono, fontSize: 9, color: t.ink3, letterSpacing: 0.12, textTransform: 'uppercase', marginTop: 3 }}>Shrine · ruin · 18 mi N of Thornmoot</div>

              {/* Mini sketch */}
              <svg viewBox="0 0 200 100" style={{ width: '100%', marginTop: 14, background: t.mode === 'night' ? '#0a0e12' : '#ece3ca', border: `1px solid ${t.rule}` }}>
                <rect x="40" y="30" width="120" height="50" fill="none" stroke={t.ink} strokeWidth="1.2" />
                <path d="M 40 30 L 60 10 L 140 10 L 160 30" fill="none" stroke={t.ink} strokeWidth="1.2" strokeDasharray="4 3" />
                <path d="M 70 10 L 68 25 M 130 10 L 132 25" stroke={t.ink3} strokeWidth="0.8" />
                <rect x="90" y="55" width="20" height="25" fill="none" stroke={t.ink} strokeWidth="1" />
                <circle cx="100" cy="20" r="4" fill="none" stroke={t.ink2} strokeWidth="0.8" />
                <line x1="100" y1="20" x2="100" y2="28" stroke={t.ink2} strokeWidth="0.6" />
                <text x="100" y="92" fontSize="6" textAnchor="middle" fill={t.ink3} fontFamily="'JetBrains Mono', monospace">ROOF COLLAPSED · BELL INTACT</text>
              </svg>

              <div style={{ fontSize: 13, color: t.ink2, lineHeight: 1.65, marginTop: 12, fontStyle: 'italic' }}>
                A chapel of the old rite, thirty paces by fifteen. The slate roof fell in a storm a generation past; the bell survived, hanging black against weather. Sheep shelter in the nave when the moor wind turns. The eastern window frame is where it always was. Half a mile from the shepherd's track.
              </div>

              <div style={{ marginTop: 12, display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 6 }}>
                {[
                  { k: 'Coord', v: '32, 30' },
                  { k: 'Size', v: '30 × 15 paces' },
                  { k: 'First use', v: 'ch.7' },
                  { k: 'Suggested tag', v: 'Oldfane (near)' },
                ].map(s => (
                  <div key={s.k} style={{ padding: 8, background: t.paper2, border: `1px solid ${t.rule}`, borderRadius: 1 }}>
                    <div style={{ fontFamily: t.mono, fontSize: 8, color: t.ink3, letterSpacing: 0.14, textTransform: 'uppercase' }}>{s.k}</div>
                    <div style={{ fontSize: 12, color: t.ink, marginTop: 1 }}>{s.v}</div>
                  </div>
                ))}
              </div>

              <div style={{ display: 'flex', gap: 6, marginTop: 14, flexWrap: 'wrap' }}>
                <button style={{ padding: '7px 14px', background: t.accent, color: t.onAccent, border: 'none', borderRadius: t.radius, fontFamily: t.display, fontWeight: 500, fontSize: 12, cursor: 'pointer' }}>Add to atlas</button>
                <button style={{ padding: '7px 14px', background: 'transparent', color: t.ink2, border: `1px solid ${t.rule}`, borderRadius: t.radius, fontFamily: t.display, fontSize: 12, cursor: 'pointer' }}>↻ Try again</button>
                <button style={{ padding: '7px 14px', background: 'transparent', color: t.ink2, border: `1px solid ${t.rule}`, borderRadius: t.radius, fontFamily: t.display, fontSize: 12, cursor: 'pointer' }}>Edit manually</button>
                <button style={{ padding: '7px 14px', background: 'transparent', color: t.ink3, border: `1px solid ${t.rule}`, borderRadius: t.radius, fontFamily: t.display, fontSize: 12, cursor: 'pointer' }}>Discard</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ThemeProvider><App /></ThemeProvider>);
</script>
</body>
</html>
