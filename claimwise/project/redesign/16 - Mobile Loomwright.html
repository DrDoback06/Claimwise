<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><title>Loomwright — Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,400;9..144,0,500;9..144,0,600;9..144,1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;min-height:100vh;background:#f2ece0;font-family:'Inter',system-ui}*::-webkit-scrollbar{width:8px;height:8px}*::-webkit-scrollbar-thumb{background:rgba(128,128,128,.3);border-radius:4px}</style>
</head><body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="proto/ios-frame.jsx"></script>
<script type="text/babel">
const CAP_ACCENT = 'oklch(52% 0.12 35)';
const PAPER = '#f7f0de';
const INK = '#1a1410';
const INK2 = '#4a3f32';
const INK3 = '#8a7d6a';
const RULE = '#e0d5b8';

// ── Screen 1: Home / today ──────────────────────────────────
function HomeScreen() {
  return (
    <div style={{background:PAPER,minHeight:'100%',paddingBottom:40}}>
      {/* Title area */}
      <div style={{padding:'68px 22px 18px'}}>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:CAP_ACCENT,letterSpacing:0.18,textTransform:'uppercase'}}>Tuesday, March 11</div>
        <div style={{fontFamily:"'Fraunces',serif",fontSize:34,fontWeight:500,color:INK,lineHeight:1.1,marginTop:8,letterSpacing:-0.5}}>The Vale Chronicles</div>
        <div style={{fontFamily:"'Fraunces',serif",fontStyle:'italic',fontSize:14,color:INK3,marginTop:6}}>Book II · chapter 15 · 74,002 words</div>
      </div>

      {/* Capture bar */}
      <div style={{margin:'8px 16px 18px',padding:'14px 16px',background:'#fff',border:`1px solid ${RULE}`,borderRadius:18,boxShadow:'0 1px 0 rgba(0,0,0,0.02)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:10,background:CAP_ACCENT,color:'#fff',display:'grid',placeItems:'center',fontFamily:"'Fraunces',serif",fontSize:18,fontWeight:500}}>✎</div>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Fraunces',serif",fontSize:16,color:INK,fontWeight:500}}>Capture a thought</div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:INK3,letterSpacing:0.1,marginTop:2,textTransform:'uppercase'}}>Voice · text · photo of a note</div>
          </div>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:INK3,letterSpacing:0.14,textTransform:'uppercase'}}>hold ◉</div>
        </div>
      </div>

      {/* Today's brief card */}
      <div style={{margin:'0 16px 14px',padding:18,background:'#fff',border:`1px solid ${RULE}`,borderLeft:`3px solid ${CAP_ACCENT}`,borderRadius:18}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:6,height:6,background:CAP_ACCENT,borderRadius:'50%'}} />
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:CAP_ACCENT,letterSpacing:0.16,textTransform:'uppercase'}}>Morning brief · 4 items</div>
        </div>
        <div style={{fontFamily:"'Fraunces',serif",fontSize:18,fontWeight:500,color:INK,marginTop:10,lineHeight:1.35}}>Good morning, Thomas.</div>
        <p style={{fontFamily:"'Fraunces',serif",fontSize:14,color:INK2,lineHeight:1.6,marginTop:6,marginBottom:0}}>You wrote the reveal and the first half of the sword-taking. Three quiet things showed up overnight.</p>
        <div style={{display:'flex',gap:6,marginTop:14,flexWrap:'wrap'}}>
          <span style={{padding:'3px 9px',background:'#f5edd8',color:INK2,fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:0.12,textTransform:'uppercase',borderRadius:1}}>3 noticed</span>
          <span style={{padding:'3px 9px',background:'oklch(65% 0.18 25 / 0.14)',color:'oklch(55% 0.18 25)',fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:0.12,textTransform:'uppercase',borderRadius:1}}>2 worry</span>
          <span style={{padding:'3px 9px',background:'oklch(78% 0.13 78 / 0.2)',color:'oklch(50% 0.13 78)',fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:0.12,textTransform:'uppercase',borderRadius:1}}>1 delight</span>
        </div>
      </div>

      {/* Section header */}
      <div style={{padding:'14px 22px 8px',fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:INK3,letterSpacing:0.18,textTransform:'uppercase'}}>Pings · since yesterday</div>

      {[
        { dot: 'oklch(65% 0.18 25)', who: 'Continuity', what: '"Two days" vs "the third morning."', when: 'ch.13 → ch.14', badge: 'Probably fix' },
        { dot: 'oklch(72% 0.10 200)', who: 'Atlas', what: 'New place · "the east ridge" needs a pin.', when: 'ch.14 ¶3', badge: 'Approve' },
        { dot: 'oklch(78% 0.13 78)', who: 'Characters', what: 'Mira\'s father has not spoken in 4 chapters.', when: 'since ch.10', badge: null },
      ].map((p, i) => (
        <div key={i} style={{margin:'0 16px 6px',padding:'12px 14px',background:'#fff',border:`1px solid ${RULE}`,borderRadius:14,display:'flex',alignItems:'center',gap:12}}>
          <span style={{width:10,height:10,background:p.dot,borderRadius:'50%',flexShrink:0}} />
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:INK3,letterSpacing:0.14,textTransform:'uppercase'}}>{p.who} · {p.when}</div>
            <div style={{fontFamily:"'Fraunces',serif",fontSize:14,color:INK,lineHeight:1.4,marginTop:2,fontStyle:'italic'}}>{p.what}</div>
          </div>
          {p.badge && <span style={{padding:'3px 8px',background:'#f5edd8',border:`1px solid ${RULE}`,color:INK2,fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:0.1,textTransform:'uppercase',borderRadius:1,flexShrink:0}}>{p.badge}</span>}
        </div>
      ))}

      {/* Spark of the day */}
      <div style={{padding:'20px 22px 6px',fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:INK3,letterSpacing:0.18,textTransform:'uppercase'}}>Today's spark</div>
      <div style={{margin:'0 16px',padding:18,background:'#1a1410',color:'#f5edd8',borderRadius:18,position:'relative',overflow:'hidden'}}>
        <div style={{fontFamily:"'Fraunces',serif",fontSize:44,color:'#c9a96a',opacity:0.6,lineHeight:1,position:'absolute',top:10,left:14}}>"</div>
        <div style={{fontFamily:"'Fraunces',serif",fontStyle:'italic',fontSize:17,lineHeight:1.5,paddingLeft:18,paddingTop:6}}>What if Edrick already knows? What if the parley is a test — not of Mira's strength, but of her mercy?</div>
        <div style={{display:'flex',gap:6,marginTop:14,paddingLeft:18}}>
          <button style={{padding:'6px 11px',background:'#c9a96a',color:'#1a1410',border:'none',borderRadius:10,fontFamily:"'Fraunces',serif",fontWeight:500,fontSize:12}}>Save</button>
          <button style={{padding:'6px 11px',background:'transparent',color:'#c9a96a',border:'1px solid rgba(201,169,106,0.4)',borderRadius:10,fontFamily:"'Fraunces',serif",fontSize:12}}>Reroll</button>
        </div>
      </div>

      {/* Tab bar spacer */}
      <div style={{height:70}} />
    </div>
  );
}

// ── Screen 2: Voice capture (mid-speak) ──────────────────────
function CaptureScreen() {
  return (
    <div style={{background:PAPER,minHeight:'100%',position:'relative'}}>
      <div style={{padding:'68px 22px 14px'}}>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:CAP_ACCENT,letterSpacing:0.18,textTransform:'uppercase'}}>Capture · voice</div>
        <div style={{fontFamily:"'Fraunces',serif",fontSize:28,fontWeight:500,color:INK,lineHeight:1.15,marginTop:6,letterSpacing:-0.3}}>Recording…</div>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:INK3,letterSpacing:0.14,marginTop:8}}>0:24 · keep going</div>
      </div>

      {/* Live waveform */}
      <div style={{margin:'8px 22px 18px',height:80,display:'flex',alignItems:'center',justifyContent:'space-between',gap:2}}>
        {Array.from({length:48}).map((_,i)=>{
          const h = 20 + Math.abs(Math.sin(i*0.7))*50 + Math.abs(Math.cos(i*0.3))*20;
          const active = i < 32;
          return <div key={i} style={{flex:1,height:Math.min(h,70),background:active?CAP_ACCENT:RULE,borderRadius:2,opacity:active?0.85:0.5}} />;
        })}
      </div>

      {/* Live transcript */}
      <div style={{margin:'0 16px',padding:18,background:'#fff',border:`1px solid ${RULE}`,borderRadius:18}}>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:INK3,letterSpacing:0.14,textTransform:'uppercase',marginBottom:10}}>Transcribing · edit later</div>
        <p style={{fontFamily:"'Fraunces',serif",fontSize:16,lineHeight:1.6,color:INK,margin:0,fontStyle:'italic'}}>
          Idea for ch.16 — what if Edrick offers the ring <span style={{color:INK2}}>a second time</span>, in front of his men, and Mira has to choose <span style={{color:INK,background:'#f5edd8',padding:'0 3px',borderRadius:2}}>in public</span>. Higher cost. Public refusal equals public insult. She can't<span style={{display:'inline-block',width:2,height:16,background:CAP_ACCENT,marginLeft:3,verticalAlign:'middle',animation:'blink 1s steps(2) infinite'}}/>
        </p>
        <style>{`@keyframes blink{50%{opacity:0}}`}</style>
      </div>

      {/* Smart tags */}
      <div style={{margin:'14px 22px 0'}}>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:INK3,letterSpacing:0.14,textTransform:'uppercase',marginBottom:8}}>Loom sees</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {['Chapter 16','Edrick','Mira','The ring','Plot beat'].map(t=>(
            <span key={t} style={{padding:'5px 11px',background:'#fff',border:`1px solid ${RULE}`,borderRadius:100,fontFamily:"'Fraunces',serif",fontSize:12,color:INK2}}>{t}</span>
          ))}
        </div>
      </div>

      {/* Big round stop button */}
      <div style={{position:'absolute',bottom:60,left:0,right:0,display:'flex',justifyContent:'center',gap:24,alignItems:'center'}}>
        <button style={{width:48,height:48,borderRadius:'50%',background:'#fff',border:`1px solid ${RULE}`,color:INK3,fontSize:20,cursor:'pointer'}}>✕</button>
        <button style={{width:82,height:82,borderRadius:'50%',background:CAP_ACCENT,border:'4px solid #fff',color:'#fff',cursor:'pointer',boxShadow:'0 6px 20px rgba(0,0,0,0.2)',display:'grid',placeItems:'center'}}>
          <div style={{width:22,height:22,background:'#fff',borderRadius:4}} />
        </button>
        <button style={{width:48,height:48,borderRadius:'50%',background:'#fff',border:`1px solid ${RULE}`,color:INK,fontFamily:"'Fraunces',serif",fontWeight:500,fontSize:14,cursor:'pointer'}}>✓</button>
      </div>
    </div>
  );
}

// ── Layout ───────────────────────────────────────────────────
function App(){
  return (
    <div style={{minHeight:'100vh',padding:'48px 32px',display:'flex',flexDirection:'column',alignItems:'center'}}>
      <div style={{maxWidth:1180,width:'100%'}}>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:CAP_ACCENT,letterSpacing:0.22,textTransform:'uppercase'}}>Doc 16 · Mobile companion</div>
        <h1 style={{fontFamily:"'Fraunces',serif",fontSize:44,fontWeight:400,letterSpacing:-0.5,color:INK,margin:'6px 0 4px'}}>Loomwright, on the walk.</h1>
        <p style={{fontFamily:"'Fraunces',serif",fontSize:16,color:INK2,lineHeight:1.65,maxWidth:'62ch',margin:0,fontStyle:'italic'}}>The desk is where you <em>write</em>. The walk is where you <em>think</em>. The mobile app isn't a shrunk editor — it's a capture device and a quiet companion. Two screens cover 90% of the use case.</p>
      </div>

      <div style={{display:'flex',gap:56,marginTop:52,flexWrap:'wrap',justifyContent:'center'}}>
        {/* Phone 1 */}
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:20}}>
          <IOSDevice width={340} height={736}>
            <HomeScreen />
          </IOSDevice>
          <div style={{textAlign:'center',maxWidth:320}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:CAP_ACCENT,letterSpacing:0.18,textTransform:'uppercase'}}>01 · Home</div>
            <div style={{fontFamily:"'Fraunces',serif",fontSize:18,fontWeight:500,color:INK,marginTop:4}}>Today's brief &amp; a quick capture</div>
            <div style={{fontFamily:"'Fraunces',serif",fontStyle:'italic',fontSize:13,color:INK3,marginTop:6,lineHeight:1.55}}>Status of your manuscript, the pings that came in overnight, and today's spark — all on one scroll.</div>
          </div>
        </div>

        {/* Phone 2 */}
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:20}}>
          <IOSDevice width={340} height={736}>
            <CaptureScreen />
          </IOSDevice>
          <div style={{textAlign:'center',maxWidth:320}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:CAP_ACCENT,letterSpacing:0.18,textTransform:'uppercase'}}>02 · Capture</div>
            <div style={{fontFamily:"'Fraunces',serif",fontSize:18,fontWeight:500,color:INK,marginTop:4}}>Think out loud, Loom files it</div>
            <div style={{fontFamily:"'Fraunces',serif",fontStyle:'italic',fontSize:13,color:INK3,marginTop:6,lineHeight:1.55}}>Hold to record. Live transcript, automatic chapter &amp; character tags. When you're home, it's already in the right drawer.</div>
          </div>
        </div>
      </div>

      {/* Principles strip */}
      <div style={{maxWidth:1000,width:'100%',marginTop:80,padding:'28px 0 0',borderTop:`1px solid ${RULE}`}}>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:CAP_ACCENT,letterSpacing:0.18,textTransform:'uppercase',marginBottom:18}}>Mobile principles</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:28}}>
          {[
            { n: '01', t: 'Not an editor.', b: 'No chapter drafting on phone. The keyboard is wrong for prose, and pretending otherwise leads to disappointed users.' },
            { n: '02', t: 'Capture is instant.', b: 'One hold from any screen. Voice, text, or a photo of a napkin. Tags itself. Finds its way to the right chapter folder.' },
            { n: '03', t: 'Read, don\'t write.', b: 'Re-read chapters on a train. Mark passages. Send yourself a voice note about a scene. Treat the phone as a reading companion.' },
            { n: '04', t: 'Brief over feed.', b: 'One coherent morning letter from the Loom — not endless notifications. Pings are batched, not urgent.' },
          ].map(p=>(
            <div key={p.n}>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:INK3,letterSpacing:0.18,textTransform:'uppercase'}}>{p.n}</div>
              <div style={{fontFamily:"'Fraunces',serif",fontSize:19,fontWeight:500,color:INK,marginTop:4,letterSpacing:-0.2}}>{p.t}</div>
              <p style={{fontFamily:"'Fraunces',serif",fontSize:14,color:INK2,lineHeight:1.65,marginTop:8}}>{p.b}</p>
            </div>
          ))}
        </div>
      </div>

      <div style={{marginTop:60,fontFamily:"'Fraunces',serif",fontStyle:'italic',fontSize:13,color:INK3,textAlign:'center'}}>— End of redesign series —</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script></body></html>
