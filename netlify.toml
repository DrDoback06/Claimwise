# ═══════════════════════════════════════════════════════════════════════
# Loomwright unified Writers Room — Netlify build config.
#
# This branch publishes the compiled Create-React-App build (the new
# `src/features/writers-room/` shell mounted at /), not the old static
# prototype under redesign/writers-room/.
# ═══════════════════════════════════════════════════════════════════════

[build]
  base    = ""
  publish = "build"
  command = "npm run build"

# CRA output is fingerprinted; treat the static folder as immutable.
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Service worker should never be cached — we want updates to apply on
# next load.
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# SPA fallback for hash-routed paths (e.g. /#/legacy).
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
