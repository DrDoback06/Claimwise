<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><title>Loomwright — Morning Brief</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,400;9..144,0,500;9..144,0,600;9..144,1,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;height:100%;overflow:hidden}*::-webkit-scrollbar{width:8px;height:8px}*::-webkit-scrollbar-thumb{background:rgba(128,128,128,.3);border-radius:4px}button{font-family:inherit}</style>
</head><body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="proto/theme.jsx"></script>
<script type="text/babel">
const BRIEF = {
  date: 'Tuesday, March 11',
  greeting: 'Good morning, Thomas.',
  readSince: '2 chapters since we last spoke · ch.13 & ch.14 · 7,842 words',
  summary: 'You wrote the reveal and the first half of the sword-taking. Mira has crossed. The prophecy has been named. Three quiet things showed up that you may want to know about before you keep going.',
  sections: [
    { kind: 'noticed', title: 'Three things I noticed',
      items: [
        { icon: '◇', title: 'You named a new place.', body: 'In ch.14 ¶3 you wrote "the east ridge" as if the reader already knows it. It isn\'t in your atlas. I drafted an entry — coordinates near Thornmoot, terrain matches ch.5 — ready for your approval.', action: 'Approve place' },
        { icon: '◇', title: 'Tobyn quoted his own prophecy without attribution.', body: 'Ch.13 ¶22 repeats four lines from the text Tobyn hid in ch.7. Intentional or cut-and-paste slip? Either reading works; I only want to make sure you saw it.', action: 'Show the two passages' },
        { icon: '◇', title: 'Mira\'s father has not spoken since ch.10.', body: 'Four chapters of silence. You may have meant this. If not, his next line is overdue.', action: 'Find a moment' },
      ]},
    { kind: 'worry', title: 'Two things that might be slips',
      items: [
        { icon: '⚠', title: 'The grey-yew bow is still at the inn.', body: 'Mira left it in ch.6 and you haven\'t mentioned it since. In ch.14 she seizes "every weapon she owned." Is the bow meant to be lost, or forgotten?', severity: 'think' },
        { icon: '⚠', title: 'Two days, or three?', body: 'Ch.13 says "two days after the feast." Ch.14 opens "the third morning since." Off by one, or an unreliable narrator moment?', severity: 'fix' },
      ]},
    { kind: 'delight', title: 'One thing that delighted me',
      items: [
        { icon: '✦', title: 'The mantelpiece callback.', body: 'The sword you hung in the first scene came down in the last one you wrote. A hundred and forty pages apart. I noticed. Your reader will too.', note: '(No action. Just wanted to say.)' },
      ]},
    { kind: 'ahead', title: 'Looking ahead',
      items: [
        { icon: '→', title: 'Three threads still open.', body: 'The letter under the tile (hidden ch.7, not yet found). Rook\'s unexplained coin (given ch.11). What Edrick actually wants (teased ch.5, ch.10, ch.14). You don\'t owe me a plan — but I\'ll keep watch.', action: 'Open thread board' },
      ]},
  ],
};
const KIND_META = {
  noticed: { color: 'oklch(72% 0.10 200)', label: 'Noticed' },
  worry:   { color: 'oklch(65% 0.18 25)',  label: 'Worth a look' },
  delight: { color: 'oklch(78% 0.13 78)',  label: 'Delight' },
  ahead:   { color: 'oklch(72% 0.13 145)', label: 'Looking ahead' },
};
function App(){
  const t = useTheme();
  const [handled,setHandled] = React.useState({});
  const toggle = k => setHandled(h => ({ ...h, [k]: !h[k] }));
  return (<div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden',background:t.bg,color:t.ink,fontFamily:t.font}}>
    <header style={{padding:'14px 28px',borderBottom:`1px solid ${t.rule}`,display:'flex',alignItems:'center',gap:14,flexShrink:0,background:t.sidebar}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:32,height:32,background:t.accent,color:t.onAccent,fontFamily:t.display,fontWeight:600,display:'grid',placeItems:'center',fontSize:15,borderRadius:2}}>L<span style={{fontSize:13,opacity:.6}}>w</span></div>
        <div><div style={{fontFamily:t.display,fontWeight:500,fontSize:15}}>Loomwright</div><div style={{fontFamily:t.mono,fontSize:9,color:t.accent,letterSpacing:.14,textTransform:'uppercase',marginTop:2}}>Morning Brief</div></div>
      </div>
      <div style={{flex:1}} />
      <button style={{padding:'6px 12px',background:'transparent',color:t.ink2,border:`1px solid ${t.rule}`,borderRadius:t.radius,fontFamily:t.mono,fontSize:10,letterSpacing:.1,textTransform:'uppercase',cursor:'pointer'}}>Past briefs</button>
      <ThemeToggle />
    </header>
    <div style={{flex:1,overflowY:'auto'}}>
      <div style={{maxWidth:780,margin:'0 auto',padding:'56px 48px 80px'}}>
        {/* Greeting */}
        <div style={{fontFamily:t.mono,fontSize:10,color:t.accent,letterSpacing:.18,textTransform:'uppercase'}}>{BRIEF.date}</div>
        <h1 style={{fontFamily:t.display,fontSize:44,fontWeight:400,margin:'10px 0 0',lineHeight:1.1,color:t.ink,letterSpacing:-0.01}}>{BRIEF.greeting}</h1>
        <div style={{fontFamily:t.display,fontStyle:'italic',fontSize:15,color:t.ink3,marginTop:10}}>{BRIEF.readSince}</div>
        <p style={{fontSize:16,color:t.ink2,lineHeight:1.75,marginTop:22,maxWidth:'60ch',fontFamily:"'Fraunces', serif"}}>{BRIEF.summary}</p>

        {/* At-a-glance chips */}
        <div style={{display:'flex',gap:6,marginTop:26,flexWrap:'wrap'}}>
          {BRIEF.sections.map(s=>(
            <div key={s.kind} style={{padding:'6px 11px',background:t.paper,border:`1px solid ${t.rule}`,borderLeft:`2px solid ${KIND_META[s.kind].color}`,borderRadius:1,fontFamily:t.mono,fontSize:10,letterSpacing:.12,textTransform:'uppercase',color:t.ink2}}>
              {s.items.length} · {KIND_META[s.kind].label}
            </div>
          ))}
        </div>

        {/* Sections */}
        {BRIEF.sections.map((sec, si) => (
          <section key={sec.kind} style={{marginTop:44}}>
            <div style={{display:'flex',alignItems:'baseline',gap:10,paddingBottom:10,borderBottom:`1px solid ${t.rule}`}}>
              <div style={{width:5,height:5,background:KIND_META[sec.kind].color,borderRadius:'50%'}} />
              <div style={{fontFamily:t.mono,fontSize:10,color:KIND_META[sec.kind].color,letterSpacing:.18,textTransform:'uppercase'}}>{String(si+1).padStart(2,'0')} · {KIND_META[sec.kind].label}</div>
              <div style={{fontFamily:t.display,fontSize:22,fontWeight:500,marginLeft:'auto',color:t.ink}}>{sec.title}</div>
            </div>
            {sec.items.map((it, i) => {
              const key = sec.kind+'-'+i;
              const done = handled[key];
              return (
                <article key={key} style={{padding:'20px 0',borderBottom:i<sec.items.length-1?`1px solid ${t.rule}`:'none',opacity:done?0.5:1,transition:'opacity .2s'}}>
                  <div style={{display:'flex',alignItems:'baseline',gap:12}}>
                    <div style={{fontFamily:t.display,fontSize:18,color:KIND_META[sec.kind].color,width:18,flexShrink:0,textAlign:'center'}}>{it.icon}</div>
                    <h3 style={{fontFamily:t.display,fontSize:18,fontWeight:500,margin:0,color:t.ink,flex:1,textDecoration:done?'line-through':'none'}}>{it.title}</h3>
                    {it.severity === 'fix' && <span style={{padding:'2px 7px',background:'oklch(65% 0.18 25 / 0.15)',color:'oklch(60% 0.18 25)',fontFamily:t.mono,fontSize:9,letterSpacing:.14,textTransform:'uppercase',borderRadius:1}}>Probably fix</span>}
                    {it.severity === 'think' && <span style={{padding:'2px 7px',background:t.paper,border:`1px solid ${t.rule}`,color:t.ink3,fontFamily:t.mono,fontSize:9,letterSpacing:.14,textTransform:'uppercase',borderRadius:1}}>Worth a think</span>}
                  </div>
                  <p style={{fontSize:15,color:t.ink2,lineHeight:1.75,margin:'10px 0 0 30px',fontFamily:"'Fraunces', serif",maxWidth:'60ch'}}>{it.body}</p>
                  {it.note && <p style={{fontSize:13,color:t.ink3,fontStyle:'italic',margin:'6px 0 0 30px',fontFamily:"'Fraunces', serif"}}>{it.note}</p>}
                  <div style={{display:'flex',gap:6,marginTop:12,marginLeft:30}}>
                    {it.action && <button style={{padding:'6px 12px',background:done?'transparent':t.accent,color:done?t.ink3:t.onAccent,border:done?`1px solid ${t.rule}`:'none',borderRadius:t.radius,fontFamily:t.display,fontWeight:500,fontSize:12,cursor:'pointer'}}>{it.action}</button>}
                    <button onClick={()=>toggle(key)} style={{padding:'6px 12px',background:'transparent',color:t.ink3,border:`1px solid ${t.rule}`,borderRadius:t.radius,fontFamily:t.mono,fontSize:10,letterSpacing:.12,textTransform:'uppercase',cursor:'pointer'}}>{done ? '↺ Undo' : '✓ Handled'}</button>
                    {sec.kind !== 'delight' && <button style={{padding:'6px 12px',background:'transparent',color:t.ink3,border:`1px solid ${t.rule}`,borderRadius:t.radius,fontFamily:t.mono,fontSize:10,letterSpacing:.12,textTransform:'uppercase',cursor:'pointer'}}>Dismiss</button>}
                  </div>
                </article>
              );
            })}
          </section>
        ))}

        {/* Closing */}
        <div style={{marginTop:64,paddingTop:28,borderTop:`1px solid ${t.rule}`,textAlign:'center'}}>
          <div style={{fontFamily:"'Fraunces', serif",fontStyle:'italic',fontSize:15,color:t.ink3,lineHeight:1.6,maxWidth:'50ch',margin:'0 auto'}}>
            That's all I have for today. Write the parley. I'll keep reading.
          </div>
          <div style={{fontFamily:t.mono,fontSize:10,color:t.ink3,letterSpacing:.18,textTransform:'uppercase',marginTop:16}}>— The Loom</div>
          <div style={{display:'flex',gap:8,marginTop:24,justifyContent:'center'}}>
            <button style={{padding:'8px 18px',background:t.accent,color:t.onAccent,border:'none',borderRadius:t.radius,fontFamily:t.display,fontWeight:500,fontSize:13,cursor:'pointer'}}>Open editor</button>
            <button style={{padding:'8px 18px',background:'transparent',color:t.ink2,border:`1px solid ${t.rule}`,borderRadius:t.radius,fontFamily:t.display,fontSize:13,cursor:'pointer'}}>Quieter brief</button>
            <button style={{padding:'8px 18px',background:'transparent',color:t.ink2,border:`1px solid ${t.rule}`,borderRadius:t.radius,fontFamily:t.display,fontSize:13,cursor:'pointer'}}>Brief settings</button>
          </div>
        </div>
      </div>
    </div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<ThemeProvider><App /></ThemeProvider>);
</script></body></html>
