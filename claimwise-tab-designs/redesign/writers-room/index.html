<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Writers Room · Loomwright</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body, #root { height: 100%; }
  body { margin: 0; background: #f4ecd8; font-family: 'Fraunces', Georgia, serif; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>

<!--
  Vendor scripts. These are served locally from ./vendor so the app works
  offline and doesn't break if unpkg.com is unreachable. If you prefer CDNs:
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
-->
<script src="vendor/react.development.js"></script>
<script src="vendor/react-dom.development.js"></script>
<script src="vendor/babel.min.js"></script>

<!-- Claimwise service bundle — exposes aiService, db, promptTemplates, integrationService,
     manuscriptIntelligenceService, writingEnhancementServices, and ~40 more on window.CW.
     Must load BEFORE any writers-room script so store.jsx can find window.CW.db. -->
<script src="claimwise-services.bundle.js"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="theme.jsx"></script>
<script type="text/babel" src="store.jsx"></script>
<script type="text/babel" src="entities.jsx"></script>
<script type="text/babel" src="onboarding.jsx"></script>
<script type="text/babel" src="onboarding-steps.jsx"></script>
<script type="text/babel" src="panel-atlas.jsx"></script>
<script type="text/babel" src="panel-cast.jsx"></script>
<script type="text/babel" src="panel-threads.jsx"></script>
<script type="text/babel" src="panel-mindmap.jsx"></script>
<script type="text/babel" src="panel-groupchat.jsx"></script>
<script type="text/babel" src="panels.jsx"></script>
<script type="text/babel" src="inline.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
